            color: orange;

<body>
    <div id="root"></div>
    <div id="error-container"></div>

        try {
            function App() {
              const [selectedService, setSelectedService] = React.useState(null);
              const [showPayload, setShowPayload] = React.useState(null);
              const [showChangePayload, setShowChangePayload] = React.useState(null);
              const [routingKeys, setRoutingKeys] = React.useState({
                power_electrical: '1dc05c3ad2524005c06f79eff03e87cf',
                hvac_cooling: '63f81c7b1ca84007d0b0b0c6f49dcee4',
                environmental_monitoring: 'a0a2a03463144902d08920e53a47740c',
                physical_security: '6b35bd392cf04709d0776ab82dd5b7dc',

                {

                    { title: 'CRITICAL: UPS On Battery - Data Hall 1', severity: 'critical', details: 'UPS-HALL-1-PRIMARY: Battery runtime 45 minutes remaining, Load 85%, Mains status: Failed' },

              const sampleChangeEvents = [

                },
                {

                  summary: 'UPS Battery Replacement - Data Hall 2',

                  description: 'Replacing UPS batteries in Data Hall 2, backup power active',
                  icon: '🔋',
                  color: 'yellow',
                  serviceId: 'power_electrical'
                },
                {
                  id: 'fire_test',
                  summary: 'Fire Suppression System Test',
                  type: 'System Test',
                  description: 'Quarterly fire suppression system test, all zones',
                  icon: '🔥',
                  color: 'pink',
                  serviceId: 'fire_safety'
                },
                {
                  id: 'network_firmware',
                  summary: 'Network Switch Firmware Update - Core',
                  type: 'Software Update',
                  description: 'Firmware update for core network switches, redundancy active',
                  icon: '🌐',
                  color: 'purple',
                  serviceId: 'network_infrastructure'
                },
                {
                  id: 'generator_test',
                  summary: 'Generator Load Test - Building Gen 1',
                  type: 'System Test',
                  description: 'Monthly generator load test, 30 minute duration',
                  icon: '⚡',
                  color: 'green',
                  serviceId: 'power_electrical'
                },
                {
                  id: 'security_upgrade',
                  summary: 'Security System Upgrade - All Halls',
                  type: 'System Upgrade',
                  description: 'Badge reader firmware upgrade across all data halls',
                  icon: '🔒',
                  color: 'red',
                  serviceId: 'physical_security'
                }
              ];

              const escalationPolicies = {
                'Critical Infrastructure': ['Immediate: Primary On-Call (SMS + Phone)', '1 min: After Hours Team (SMS + Phone)', '5 min: Management Escalation (SMS + Phone)'],
                'Environmental Systems': ['Immediate: Environmental On-Call (SMS + Phone)', '1 min: Primary On-Call (SMS + Phone)', '5 min: Management Escalation (SMS + Phone)'],
                'Network Infrastructure': ['Immediate: Primary On-Call (SMS + Phone)', '5 min: After Hours Team (SMS + Phone)', '15 min: Management Escalation (SMS + Phone)'],
                'Power & Electrical': ['Immediate: Power Specialists (SMS + Phone)', '5 min: Primary On-Call (SMS + Phone)', '15 min: Management Escalation (SMS + Phone)'],
                'Security Response': ['Immediate: Security On-Call (SMS + Phone)', '1 min: Primary On-Call (SMS + Phone)', '5 min: Management Escalation (SMS + Phone)'],
                'Life Safety Critical': ['Immediate: Environmental + Security (Dual Notification)', '1 min: Primary On-Call (SMS + Phone)', '3 min: Management Escalation (SMS + Phone)']
              };

              const getSeverityColor = (severity) => {
                switch(severity) {
                  case 'critical': return 'bg-red-600 text-white';
                  case 'error': return 'bg-orange-500 text-white';
                  case 'warning': return 'bg-yellow-500 text-white';
                  case 'info': return 'bg-blue-500 text-white';
                  default: return 'bg-gray-500 text-white';
                }
              };

              const getChangeEventColors = (color) => {
                switch(color) {
                  case 'blue': return { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-900', subtext: 'text-blue-700', button: 'bg-blue-600', buttonHover: 'hover:bg-blue-700' };
                  case 'yellow': return { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-900', subtext: 'text-yellow-700', button: 'bg-yellow-600', buttonHover: 'hover:bg-yellow-700' };
                  case 'orange': return { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-900', subtext: 'text-orange-700', button: 'bg-orange-600', buttonHover: 'hover:bg-orange-700' };
                  case 'purple': return { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-900', subtext: 'text-purple-700', button: 'bg-purple-600', buttonHover: 'hover:bg-purple-700' };
                  case 'green': return { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-900', subtext: 'text-green-700', button: 'bg-green-600', buttonHover: 'hover:bg-green-700' };
                  case 'red': return { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-900', subtext: 'text-red-700', button: 'bg-red-600', buttonHover: 'hover:bg-red-700' };
                  default: return { bg: 'bg-gray-50', border: 'border-gray-200', text: 'text-gray-900', subtext: 'text-gray-700', button: 'bg-gray-600', buttonHover: 'hover:bg-gray-700' };
                }
              };

              const getEscalationTime = (severity) => {
                switch(severity) {
                  case 'critical': return 60;
                  case 'error': return 60;
                  case 'warning': return 300;
                  case 'info': return 900;
                  default: return 60;
                }
              };

              const toggleAlertSelection = (serviceId, alertIndex) => {
                setSelectedAlerts(prev => {
                  const key = `${serviceId}_${alertIndex}`;
                  const newState = {...prev};
                  if (newState[key]) {
                    delete newState[key];
                  } else {
                    newState[key] = true;
                  }
                  return newState;
                });
              };

              const getSelectedAlertsForService = (serviceId) => {
                return [0, 1, 2].filter(idx => selectedAlerts[`${serviceId}_${idx}`]);
              };

              const getAlertCount = (serviceId) => {
                return alertCounts[serviceId] || 1;
              };

              const setAlertCount = (serviceId, count) => {
                setAlertCounts(prev => ({...prev, [serviceId]: count}));
              };

              const generatePayload = (service, sampleAlert) => {
                return {
                  routing_key: routingKeys[service.id] || "YOUR_INTEGRATION_KEY_HERE",
                  event_action: "trigger",
                  dedup_key: `${service.id}-${Date.now()}-${Math.random()}`,
                  payload: {
                    summary: sampleAlert.title,
                    source: sampleAlert.details.split(':')[0] || service.name,
                    severity: sampleAlert.severity,
                    timestamp: new Date().toISOString(),
                    component: service.name,
                    group: "Datacenter BMS",
                    class: "Niagara Alert",
                    custom_details: {
                    alert_details: sampleAlert.details,
                    location: "Sydney Datacenter",
                    bms_system: "Niagara Framework",
                    service_id: service.id
                    }
                  },
                  links: [{
                    href: "https://bms.example.com/alerts",
                    text: "View in BMS"
                  }]
                };
              };

              const sendAlert = async (service, sampleAlert) => {
                const payload = generatePayload(service, sampleAlert);
                setSendingAlert(service.id);
                setApiResponse(null);

                try {
                  const response = await fetch('https://events.pagerduty.com/v2/enqueue', {
                    method: 'POST',
                    headers: {
                    'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                  });

                  const data = await response.json();
                  setApiResponse({
                    success: response.ok,
                    status: response.status,
                    data: data,
                    service: service.name
                  });
                } catch (error) {
                  setApiResponse({
                    success: false,
                    error: error.message,
                    service: service.name
                  });
                } finally {
                  setSendingAlert(null);
                }
              };

              const generateChangePayload = (changeEvent) => {
                return {
                  routing_key: changeEventKeys[changeEvent.serviceId] || "YOUR_INTEGRATION_KEY_HERE",
                  payload: {
                    summary: changeEvent.summary,
                    timestamp: new Date().toISOString(),
                    source: "CMMS",
                    custom_details: {
                    change_id: changeEvent.id,
                    change_type: changeEvent.type,
                    description: changeEvent.description,
                    service_id: changeEvent.serviceId,
                    location: "Sydney Datacenter",
                    system: "CMMS"
                    }
                  },
                  links: [{
                    href: "https://cmms.example.com/changes",
                    text: "View in CMMS"
                  }]
                };
              };

              const sendChangeEvent = async (changeEvent) => {
                const payload = generateChangePayload(changeEvent);
                setSendingAlert(changeEvent.id);
                setApiResponse(null);

                try {
                  const response = await fetch('https://events.pagerduty.com/v2/change/enqueue', {
                    method: 'POST',
                    headers: {
                    'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                  });

                  const data = await response.json();
                  setApiResponse({
                    success: response.ok,
                    status: response.status,
                    data: data,
                    service: 'CMMS Change Events'
                  });
                } catch (error) {
                  setApiResponse({
                    success: false,
                    error: error.message,
                    service: 'CMMS Change Events'
                  });
                } finally {
                  setSendingAlert(null);
                }
              };

              return (
                <div className="min-h-screen bg-gray-50 p-8">
                  <div className="max-w-7xl mx-auto">
                    <div className="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <div>
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">
                    PagerDuty Datacenter Service Architecture
                    </h1>
                    <p className="text-gray-600">
                    Niagara BMS Integration - Send Alerts to PagerDuty (Sydney/Australia Timezone)
                    </p>
                    </div>
                    </div>

                    {apiResponse && (
                    <div className={`rounded-lg shadow-lg p-4 mb-8 ${apiResponse.success ? 'bg-green-50 border-2 border-green-500' : 'bg-red-50 border-2 border-red-500'}`}>
                    <div className="flex items-start justify-between">
                    <div className="flex-1">
                    <div className={`font-bold text-lg mb-2 ${apiResponse.success ? 'text-green-800' : 'text-red-800'}`}>
                    {apiResponse.success ? '✅ Alert Sent Successfully!' : '❌ Alert Failed'}
                    </div>
                    <div className={`text-sm ${apiResponse.success ? 'text-green-700' : 'text-red-700'}`}>
                    Service: {apiResponse.service}
                    {apiResponse.success && apiResponse.data && (
                    <div className="mt-1">
                    <div>Status: {apiResponse.data.status}</div>
                    <div>Dedup Key: {apiResponse.data.dedup_key}</div>
                    </div>
                    )}
                    {!apiResponse.success && apiResponse.error && (
                    <div className="mt-1">Error: {apiResponse.error}</div>
                    )}
                    </div>
                    </div>
                    <button
                    onClick={() => setApiResponse(null)}
                    className="text-gray-600 hover:text-gray-800 font-bold text-xl"
                    >
                    ×
                    </button>
                    </div>
                    </div>
                    )}



                    <div className="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Alert Flow Architecture</h2>

                    <div className="flex items-center mb-8 relative px-8 gap-4">
                    <div className="text-center relative" style={{width: '216px', height: '168px'}}>
                    <div className="bg-gray-700 text-white rounded-lg p-6 w-full h-full flex flex-col justify-center">
                    <div className="text-4xl mb-2">🏢</div>
                    <div className="font-bold">Niagara BMS</div>
                    <div className="text-sm mt-2">Building Management System</div>
                    </div>
                    </div>

                    <div className="flex items-center justify-center" style={{width: '240px'}}>
                    <div className="text-8xl text-gray-400">→</div>
                    </div>

                    <div className="text-center relative" style={{width: '216px', height: '168px'}}>
                    <div className="bg-green-600 text-white rounded-lg p-6 w-full h-full flex flex-col justify-center">
                    <div className="text-4xl mb-2">🔄</div>
                    <div className="font-bold">Integration</div>
                    <div className="text-sm mt-2">Alert Mapping & Routing</div>
                    </div>
                    </div>

                    <div className="flex items-center justify-center" style={{width: '240px'}}>
                    <div className="text-8xl text-gray-400">→</div>
                    </div>

                    <div className="text-center relative" style={{width: '216px', height: '168px'}}>
                    <div className="bg-green-700 text-white rounded-lg p-6 w-full h-full flex flex-col justify-center">
                    <div className="text-4xl mb-2">📟</div>
                    <div className="font-bold">PagerDuty</div>
                    <div className="text-sm mt-2">Incident Management</div>
                    </div>
                    </div>

                    <div className="flex items-center justify-center" style={{width: '240px'}}>
                    <div className="text-8xl text-gray-400">↔</div>
                    </div>

                    <div className="text-center relative" style={{width: '216px', height: '168px'}}>
                    <div className="bg-blue-600 text-white rounded-lg p-6 w-full h-full flex flex-col justify-center">
                    <div className="text-4xl mb-2">🔧</div>
                    <div className="font-bold">CMMS</div>
                    <div className="text-sm mt-2">Work Order Management</div>
                    </div>
                    </div>
                    </div>
                    </div>

                    <div className="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Technical Services</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {services.map(service => {
                    const selectedCount = getSelectedAlertsForService(service.id).length;
                    const alertCount = getAlertCount(service.id);
                    return (
                    <div
                    key={service.id}
                    className="border-2 border-gray-200 rounded-lg p-6 hover:shadow-lg transition-all cursor-pointer relative"
                    onClick={() => setSelectedService(service)}
                    >
                    <div className="flex items-center mb-4">
                    <div className={`${service.color} text-white rounded-full w-12 h-12 flex items-center justify-center text-2xl mr-4`}>
                    {service.icon}
                    </div>
                    <h3 className="font-bold text-lg text-gray-800">{service.name}</h3>
                    </div>
                    <div className="mb-3">
                    <div className="text-sm font-semibold text-gray-600 mb-2">
                    Sample Alerts (click to select):
                    <span className="ml-2 text-xs bg-purple-100 text-purple-800 px-2 py-1 rounded font-bold">
                    {selectedCount > 0 ? `${selectedCount} selected - will send ALL` : 'None selected - will send 1 random'}
                    </span>
                    </div>
                    <div className="space-y-2">
                    {service.sampleAlerts.map((alert, idx) => {
                    const isSelected = selectedAlerts[`${service.id}_${idx}`];
                    return (
                    <div
                    key={idx}
                    onClick={(e) => {
                    e.stopPropagation();
                    toggleAlertSelection(service.id, idx);
                    }}
                    className={`text-xs px-3 py-3 rounded-lg cursor-pointer transition-all flex items-center gap-3 border-2 ${
                    isSelected 
                    ? 'bg-blue-500 border-blue-600 text-white font-bold shadow-md transform scale-105' 
                    : 'bg-white border-gray-300 text-gray-700 hover:bg-blue-50 hover:border-blue-300'
                    }`}
                    >
                    <div className={`w-5 h-5 rounded flex items-center justify-center flex-shrink-0 border-2 ${
                    isSelected 
                    ? 'bg-white border-white' 
                    : 'bg-white border-gray-400'
                    }`}>
                    {isSelected && <span className="text-blue-600 font-bold text-sm">✓</span>}
                    </div>
                    <span className="flex-1 leading-tight">{alert.title.split(':').pop().trim()}</span>
                    </div>
                    );
                    })}
                    </div>
                    </div>

                    <div className="mb-3 bg-gray-50 border-2 border-gray-300 rounded-lg p-3" onClick={(e) => e.stopPropagation()}>
                    <div className="text-sm font-semibold text-gray-700 mb-2">
                    🔢 Number of times to send:
                    </div>
                    <div className="flex items-center gap-2">
                    <button
                    onClick={(e) => {
                    e.stopPropagation();
                    if (alertCount > 1) setAlertCount(service.id, alertCount - 1);
                    }}
                    className="bg-gray-600 text-white w-8 h-8 rounded font-bold hover:bg-gray-700 disabled:bg-gray-300"
                    disabled={alertCount <= 1}
                    >
                    −
                    </button>
                    <div className="flex-1 text-center">
                    <span className="text-2xl font-bold text-gray-800">{alertCount}</span>
                    <span className="text-xs text-gray-600 ml-1">time{alertCount !== 1 ? 's' : ''}</span>
                    </div>
                    <button
                    onClick={(e) => {
                    e.stopPropagation();
                    if (alertCount < 10) setAlertCount(service.id, alertCount + 1);
                    }}
                    className="bg-gray-600 text-white w-8 h-8 rounded font-bold hover:bg-gray-700 disabled:bg-gray-300"
                    disabled={alertCount >= 10}
                    >
                    +
                    </button>
                    </div>
                    <div className="text-xs text-gray-600 mt-2 text-center">
                    {selectedCount > 0 
                    ? `Will send ${selectedCount} alert${selectedCount > 1 ? 's' : ''} × ${alertCount} = ${selectedCount * alertCount} total`
                    : `Will send 1 random alert × ${alertCount} = ${alertCount} total`
                    }
                    </div>
                    </div>

                    <div className="mt-3 pt-3 border-t border-gray-200 mb-3">
                    <div className="text-sm font-semibold text-gray-600 mb-1">Teams:</div>
                    <div className="flex gap-2">
                    {service.teams.map((team, idx) => (
                    <span key={idx} className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">
                    {team}
                    </span>
                    ))}
                    </div>
                    </div>
                    <div className="mb-2">
                    <label className="text-xs font-semibold text-gray-600 mb-1 block">Alert Events Integration Key:</label>
                    <input
                    type="text"
                    placeholder="Integration Key (optional)"
                    value={routingKeys[service.id] || ''}
                    onChange={(e) => {
                    e.stopPropagation();
                    setRoutingKeys(prev => ({...prev, [service.id]: e.target.value}));
                    }}
                    onClick={(e) => e.stopPropagation()}

                    </div>

                    onClick={(e) => {
                    e.stopPropagation();
                    const selectedIndices = getSelectedAlertsForService(service.id);
                    const indicesToSend = selectedIndices.length > 0 
                    ? selectedIndices
                    : [Math.floor(Math.random() * service.sampleAlerts.length)];
                    const repeatCount = getAlertCount(service.id);
                    
                    indicesToSend.forEach((alertIndex, idx) => {
                    const sampleAlert = service.sampleAlerts[alertIndex];
                    for (let repeat = 0; repeat < repeatCount; repeat++) {
                    const totalDelay = (repeat * indicesToSend.length * 500) + (idx * 500);
                    setTimeout(() => {
                    sendAlert(service, sampleAlert);
                    }, totalDelay);
                    }
                    });
                    }}
                    disabled={sendingAlert === service.id}
                    className="w-full bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700 transition-colors disabled:bg-gray-400 text-sm"

                    changeEvent.color === 'green' ? 'flex-1 bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded text-xs font-bold transition-all disabled:opacity-50' :
                    changeEvent.color === 'red' ? 'flex-1 bg-red-600 hover:bg-red-700 text-white py-2 px-3 rounded text-xs font-bold transition-all disabled:opacity-50' :
                    'flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2 px-3 rounded text-xs font-bold transition-all disabled:opacity-50'

                    </button>
                    </div>

                    <div className="bg-white rounded-lg shadow-lg p-6 mb-8">

                    <div className="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Key Features</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="flex items-start">
                    <div className="bg-green-100 text-green-800 rounded-full w-8 h-8 flex items-center justify-center font-bold mr-3 flex-shrink-0">✓</div>
                    <div>
                    <div className="font-bold text-gray-800">Multi-Alert Selection & Repeat</div>
                    <div className="text-sm text-gray-600">Select multiple alerts and choose how many times to send them (1-10×)</div>

                    </div>
                    <div className="border-2 border-red-200 rounded-lg p-4 bg-red-50">
                    <div className="font-bold text-red-900 mb-2">🔒 Security Incident</div>
                    <div className="text-sm text-red-800">Select all 3 security alerts, send 2× for repeated breach attempts</div>
                    </div>
                    <div className="border-2 border-yellow-200 rounded-lg p-4 bg-yellow-50">

                    <div className="text-sm text-yellow-800">Select: UPS battery + Generator failure, send 4× for power cascade</div>
                    </div>
                    <div className="border-2 border-orange-200 rounded-lg p-4 bg-orange-50">

                    <div className="text-sm text-orange-800">Select: Smoke + Suppression, send 2× for incident grouping</div>
                    </div>
                    <div className="border-2 border-green-200 rounded-lg p-4 bg-green-50">
                    <div className="font-bold text-green-900 mb-2">🔧 Maintenance Events</div>
                    <div className="text-sm text-green-800">Send change events to correlate maintenance with incidents</div>
                    </div>
                    </div>
                    </div>
                  </div>
                </div>
              );
            }

            ReactDOM.render(<App />, document.getElementById('root'));
        } catch(error) {
            displayError('An error occurred while loading the application.');
        }
        window.addEventListener('error', function(event) {
            displayError(event.message, event.error?.stack);
        });
        function displayError(message, stackInfo) {
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.createElement('div');
            errorMessage.textContent = message;
            errorContainer.appendChild(errorMessage);
            if(stackInfo) {
                const stackErrorMessage = document.createElement('pre');
                stackErrorMessage.textContent = stackInfo.substring(0, 130);
                errorContainer.appendChild(stackErrorMessage);
            }
            errorContainer.style.display = 'block';
        }
    </script>
</body>
</html>
